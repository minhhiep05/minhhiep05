name: Generate Snake Animation
 
on:
  schedule:
    - cron: "0 */12 * * *"   # chạy lại mỗi 12 tiếng
  workflow_dispatch:          # cho phép chạy tay từ tab Actions
  push:
    branches:
      - main                  # tự chạy mỗi khi bạn push code lên nhánh chính
 
permissions:
  contents: write
 
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: minhhiep05
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
 
      - name: Push generated files to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
